<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Login to the Stackly management dashboard."><title>Login | Stackly</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"></head><body>
<main class="auth-page page-shell"><section class="container auth-layout"><div class="auth-copy reveal"><a class="auth-logo" href="index.html" aria-label="Stackly home"><img src="assets/images/logo stackly.webp" alt="Stackly logo"></a><p class="section-kicker" style="color:#f7d96b">Manager access</p><h1>Welcome back to the farm command center.</h1><p class="lead">Sign in to review milk collection, herd health, employee tasks, feed inventory, and farm reports.</p></div><form class="auth-card glass reveal fade-right" id="loginForm" novalidate><p class="section-kicker">Secure login</p><h2>Login</h2><div class="form-grid" style="margin-top:22px"><div class="form-field"><label for="email">Email</label><input id="email" type="email" autocomplete="email" required><span class="error-message"></span></div><div class="form-field"><label for="password">Password</label><div class="password-wrap"><input id="password" type="password" autocomplete="current-password" required><button class="toggle-password" type="button" data-target="#password">Show</button></div><span class="error-message"></span></div><div class="auth-tools"><label><input type="checkbox"> Remember me</label><a href="404.html">Forgot password?</a></div><button class="btn-solid" type="submit">Login</button><p>New to Stackly? <a href="register.html">Create an account</a></p></div></form></section></main>
<script src="js/navigation.js"></script><script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script><script src="js/animations.js"></script><script src="js/login.js"></script><script src="js/main.js"></script></body></html>
