<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found at Stackly.">
  <title>404 | Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: #ffffff;
      background:
        linear-gradient(rgba(8, 18, 12, 0.6), rgba(8, 18, 12, 0.6)),
        url("assets/images/pasture-care-background.webp") center/cover no-repeat;
    }

    .error-page {
      width: min(100% - 32px, 860px);
      display: grid;
      justify-items: center;
      text-align: center;
      padding: 48px 20px;
    }

    .error-logo {
      width: 168px;
      height: 60px;
      display: grid;
      place-items: center;
      margin-bottom: 26px;
      border-radius: 12px;
      background: rgba(7, 55, 35, 0.8);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(10px);
    }

    .error-logo img {
      width: 92%;
      height: 92%;
      object-fit: contain;
      filter: brightness(0) saturate(100%) invert(100%) drop-shadow(0 4px 12px rgba(0, 0, 0, 0.28));
    }

    .error-code {
      margin: 0;
      color: #ffffff;
      font: 900 clamp(6rem, 18vw, 12rem)/0.82 var(--font-heading);
      letter-spacing: 0;
      text-shadow: 0 16px 42px rgba(0, 0, 0, 0.38);
    }

    .error-title {
      margin: 24px 0 0;
      color: #ffffff;
      font: 900 clamp(2rem, 6vw, 4rem)/1.02 var(--font-heading);
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.42);
    }

    .error-text {
      max-width: 560px;
      margin: 16px auto 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 1rem;
      line-height: 1.7;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.42);
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 30px;
    }

    .error-actions .btn-solid {
      background: linear-gradient(135deg, #6ac83f, #2e7d32);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.26);
    }

    .error-actions .btn-outline {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
    }

    body.is-loading {
      overflow: hidden;
    }

    .page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #d8eed6;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }

    body.is-loading .page-loader {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .page-loader-card {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 10px;
      width: min(100%, 320px);
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      text-align: center;
    }

    .page-loader-card strong {
      color: #143526;
      font-family: var(--font-heading);
      font-size: 1.05rem;
      letter-spacing: 0.02em;
    }

    .page-loader-card span {
      color: rgba(20, 53, 38, 0.72);
      font-size: 0.95rem;
    }

    .page-loader-logo {
      width: 148px;
      min-height: 64px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .page-loader-logo img {
      width: 100%;
      height: auto;
      filter: brightness(0) saturate(100%) invert(25%) sepia(56%) saturate(612%) hue-rotate(92deg) brightness(92%) contrast(88%);
    }

    .page-loader-ring {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 3px solid rgba(31, 127, 60, 0.16);
      border-top-color: #2e7d32;
      border-right-color: rgba(88, 178, 79, 0.42);
      animation: stackly-spin 1s linear infinite;
    }

    @keyframes stackly-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 520px) {
      .error-page {
        width: min(100% - 24px, 860px);
        padding: 34px 12px;
      }

      .error-logo {
        width: 142px;
        height: 52px;
      }

      .error-actions {
        width: 100%;
      }

      .error-actions a,
      .error-actions button {
        width: min(100%, 260px);
      }
    }
  </style>
</head>
<body>
  <script>
    document.body.classList.add("is-loading");
  </script>
  <div id="stackly-page-loader" class="page-loader" aria-hidden="true">
    <div class="page-loader-card" role="status" aria-live="polite" aria-label="Loading Stackly">
      <span class="page-loader-ring" aria-hidden="true"></span>
      <span class="page-loader-logo">
        <img src="assets/images/logo stackly.webp" alt="">
      </span>
      <strong>Loading Stackly</strong>
    </div>
  </div>
  <main class="error-page" aria-labelledby="error-title">
    <a class="error-logo" href="index.html" aria-label="Stackly home">
      <img src="assets/images/logo stackly.webp" alt="Stackly logo">
    </a>
    <h1 class="error-code">404</h1>
    <h2 class="error-title" id="error-title">Something is wrong</h2>
    <p class="error-text">The page you are looking for is not available. You can go back to the previous page or return to the Stackly home page.</p>
    <div class="error-actions">
      <button class="btn-outline" type="button" onclick="history.length > 1 ? history.back() : location.href='index.html'">Go Back</button>
      <a class="btn-solid" href="index.html">Back To Home</a>
    </div>
  </main>
  <script>
    document.body.classList.add("is-loading");
    window.addEventListener("load", () => {
      window.setTimeout(() => {
        document.body.classList.remove("is-loading");
      }, 1500);
    });
  </script>
</body>
</html>
