<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Register for Stackly farm management access."><title>Register | Stackly</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"></head><body>
<main class="auth-page page-shell"><section class="container auth-layout"><div class="auth-copy reveal"><a class="auth-logo" href="index.html" aria-label="Stackly home"><img src="assets/images/logo stackly.webp" alt="Stackly logo"></a><p class="section-kicker" style="color:#f7d96b">Start management</p><h1>Create a premium dairy operations account.</h1><p class="lead">Register your team lead profile and continue to the login page to access the dashboard.</p></div><form class="auth-card glass reveal fade-right" id="registerForm" novalidate><p class="section-kicker">Create account</p><h2>Register</h2><div class="form-grid" style="margin-top:22px"><div class="form-row"><div class="form-field"><label for="firstName">First Name</label><input id="firstName" required><span class="error-message"></span></div><div class="form-field"><label for="lastName">Last Name</label><input id="lastName" required><span class="error-message"></span></div></div><div class="form-row"><div class="form-field"><label for="email">Email</label><input id="email" type="email" required><span class="error-message"></span></div><div class="form-field"><label for="phone">Phone</label><input id="phone" type="tel" required><span class="error-message"></span></div></div><div class="form-row"><div class="form-field"><label for="password">Password</label><div class="password-wrap"><input id="password" type="password" required><button class="toggle-password" type="button" data-target="#password">Show</button></div><span class="error-message"></span></div><div class="form-field"><label for="confirmPassword">Confirm Password</label><div class="password-wrap"><input id="confirmPassword" type="password" required><button class="toggle-password" type="button" data-target="#confirmPassword">Show</button></div><span class="error-message"></span></div></div><div class="check-row"><label><input id="terms" type="checkbox"> I accept the farm data policy</label></div><span class="error-message" id="termsError"></span><button class="btn-solid" type="submit">Create Account</button><p>Already have an account? <a href="login.html">Login</a></p></div></form></section></main>
